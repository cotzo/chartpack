{{- if eq .Values.workloadType "CronJob" }}
apiVersion: batch/v1
kind: CronJob
{{ include "chartpack.metadata" (dict "context" $) }}
spec:
  schedule: {{ .Values.workloads.cronJob.schedule | quote }}
  {{- with .Values.workloads.cronJob.timeZone }}
  timeZone: {{ . | quote }}
  {{- end }}
  {{- with .Values.workloads.cronJob.concurrencyPolicy }}
  concurrencyPolicy: {{ . }}
  {{- end }}
  {{- if not (kindIs "invalid" .Values.workloads.cronJob.suspend) }}
  suspend: {{ .Values.workloads.cronJob.suspend }}
  {{- end }}
  {{- with .Values.workloads.cronJob.successfulJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ . }}
  {{- end }}
  {{- with .Values.workloads.cronJob.failedJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ . }}
  {{- end }}
  {{- with .Values.workloads.cronJob.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ . }}
  {{- end }}
  jobTemplate:
    spec:
      {{- with .Values.workloads.job.backoffLimit }}
      backoffLimit: {{ . }}
      {{- end }}
      {{- with .Values.workloads.job.activeDeadlineSeconds }}
      activeDeadlineSeconds: {{ . }}
      {{- end }}
      {{- with .Values.workloads.job.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ . }}
      {{- end }}
      {{- with .Values.workloads.job.completions }}
      completions: {{ . }}
      {{- end }}
      {{- with .Values.workloads.job.parallelism }}
      parallelism: {{ . }}
      {{- end }}
      {{- with .Values.workloads.job.completionMode }}
      completionMode: {{ . }}
      {{- end }}
      {{- with .Values.workloads.job.podReplacementPolicy }}
      podReplacementPolicy: {{ . }}
      {{- end }}
      template:
        {{- include "chartpack.podTemplate" . | nindent 8 }}
{{- end }}
